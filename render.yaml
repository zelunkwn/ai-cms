services:
  - type: web
    name: ai-cms-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn production:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-cms-db
          property: connectionString

databases:
  - name: ai-cms-db
    databaseName: ai_cms
    plan: free