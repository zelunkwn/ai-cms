services:
  - type: web
    name: ai-cms-platform
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-cms-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: ai-cms-db
    databaseName: ai_cms
    plan: free
    region: singapore